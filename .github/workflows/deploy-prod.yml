name: deploy-crm-prod

run-name: "prod:${{ github.ref_name }} @ ${{ github.sha }}"

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-crm-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    env:
      FRONTEND_TARGET_DIR: crm-frontend-prod
      BACKEND_TARGET_DIR: crm-backend-prod
      PM2_APP_NAME: crm-backend-prod
      DEPLOY_TMP_DIR: /var/www/.deploy/prod
      BACKUP_ROOT: /var/www/.deploy/backups/prod
      BACKUP_KEEP: 14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print deploy context
        run: |
          echo "Environment: prod"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Detect frontend/backend dirs
        run: |
          set -e
          if [ -d Frontend ]; then echo "FE_DIR=Frontend" >> "$GITHUB_ENV"; else echo "FE_DIR=frontend" >> "$GITHUB_ENV"; fi
          if [ -d Backend  ]; then echo "BE_DIR=Backend"  >> "$GITHUB_ENV"; else echo "BE_DIR=backend"  >> "$GITHUB_ENV"; fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ secrets.NODE_VERSION || '20' }}

      # ---------- FRONTEND ----------
      - name: Write frontend env files (normalize)
        working-directory: ./${{ env.FE_DIR }}
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
        run: |
          set -e
          python3 - <<'PY'
          import os
          from pathlib import Path

          data = os.environ.get("FRONTEND_ENV", "")
          data = data.replace("\r\n", "\n").replace("\r", "\n")

          if not data.strip():
              raise SystemExit("FRONTEND_ENV is empty")

          env_prod = Path(".env.production")
          env_prod.write_text(data.rstrip("\n") + "\n", encoding="utf-8")

          Path(".env").write_text(env_prod.read_text(encoding="utf-8"), encoding="utf-8")
          PY

      - name: Remove other env files
        working-directory: ./${{ env.FE_DIR }}
        run: |
          set -e
          rm -f .env.local .env.development .env.development.local .env.production.local || true

      - name: Validate & export VITE_API_URL
        working-directory: ./${{ env.FE_DIR }}
        run: |
          set -e
          python3 - <<'PY' >> "$GITHUB_ENV"
          import re
          from pathlib import Path

          text = Path(".env.production").read_text(encoding="utf-8")
          m = re.search(r"^VITE_API_URL=(.*)$", text, flags=re.MULTILINE)
          if not m:
              raise SystemExit("VITE_API_URL is missing in FRONTEND_ENV")

          url = m.group(1).strip().replace("\r", "")
          if (url.startswith('"') and url.endswith('"')) or (url.startswith("'") and url.endswith("'")):
              url = url[1:-1].strip()

          url = url.rstrip("/")
          if not url:
              raise SystemExit("VITE_API_URL is empty after normalization")

          print(f"VITE_API_URL={url}")
          PY

      - name: Validate frontend env contract
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
        run: |
          set -e
          URL="${VITE_API_URL//$'\r'/}"
          URL="${URL%/}"
          if [ "$URL" != "/api" ]; then
            echo "FRONTEND_ENV must contain VITE_API_URL=/api (got '$URL')." >&2
            exit 1
          fi

      - name: Install & Build frontend
        working-directory: ./${{ env.FE_DIR }}
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
        run: |
          set -e
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          npm run build -- --mode production || npm run build

      - name: Detect FE_OUT
        run: |
          set -e
          FE_DIR="${{ env.FE_DIR }}"
          if [ -d "$FE_DIR/dist" ]; then
            FE_OUT="dist"
          elif [ -d "$FE_DIR/build" ]; then
            FE_OUT="build"
          else
            echo "Build dir not found (expected dist/ or build/)" >&2
            exit 1
          fi

          echo "FE_OUT=$FE_OUT" >> "$GITHUB_ENV"
          echo "FE_DIR=$FE_DIR" >> "$GITHUB_ENV"

          test -d "$FE_DIR/$FE_OUT"

      - name: Fail if bundle contains bad base url
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
        run: |
          set -e
          OUT="${{ env.FE_DIR }}/${{ env.FE_OUT }}"
          URL="${VITE_API_URL//$'\r'/}"
          URL="${URL%/}"

          if grep -RIn --no-messages "/undefined/" "$OUT" >/dev/null ; then
            echo "Bundle contains '/undefined/'. Check VITE_API_URL!" >&2
            exit 1
          fi

          if [ -z "$URL" ]; then
            echo "VITE_API_URL is missing." >&2
            exit 1
          fi

      - name: Pack frontend build
        run: |
          set -e
          tar -C "${{ env.FE_DIR }}" -czf frontend.tgz "${{ env.FE_OUT }}"

      - name: Upload frontend archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: "frontend.tgz"
          target: "${{ env.DEPLOY_TMP_DIR }}"
          overwrite: true

      - name: Backup current deployment on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail

            STAMP="$(date +%Y%m%d_%H%M%S)"
            BACKUP_ROOT="${{ env.BACKUP_ROOT }}"
            FILES_DIR="$BACKUP_ROOT/files"
            DB_DIR="$BACKUP_ROOT/db"
            META_DIR="$BACKUP_ROOT/meta"
            KEEP="${{ env.BACKUP_KEEP }}"
            FRONTEND_DIR="/var/www/${{ env.FRONTEND_TARGET_DIR }}"
            BACKEND_DIR="/var/www/${{ env.BACKEND_TARGET_DIR }}"

            mkdir -p "$FILES_DIR" "$DB_DIR" "$META_DIR"

            if [ -d "$FRONTEND_DIR" ] && [ "$(find "$FRONTEND_DIR" -mindepth 1 -maxdepth 1 | head -n 1)" ]; then
              tar -C /var/www -czf "$FILES_DIR/frontend_${STAMP}.tgz" "${{ env.FRONTEND_TARGET_DIR }}"
            else
              echo "Frontend dir missing or empty, skipping frontend backup"
            fi

            if [ -d "$BACKEND_DIR" ] && [ "$(find "$BACKEND_DIR" -mindepth 1 -maxdepth 1 | head -n 1)" ]; then
              tar \
                --exclude="${{ env.BACKEND_TARGET_DIR }}/node_modules" \
                --exclude="${{ env.BACKEND_TARGET_DIR }}/.git" \
                -C /var/www \
                -czf "$FILES_DIR/backend_${STAMP}.tgz" \
                "${{ env.BACKEND_TARGET_DIR }}"
            else
              echo "Backend dir missing or empty, skipping backend backup"
            fi

            if [ -f "$BACKEND_DIR/.env" ]; then
              if ! command -v pg_dump >/dev/null 2>&1; then
                echo "pg_dump is not installed on server" >&2
                exit 1
              fi

              DB_URL="$(python3 - "$BACKEND_DIR/.env" <<'PY'
import sys
from pathlib import Path
from urllib.parse import urlsplit, urlunsplit

env_path = Path(sys.argv[1])
raw = ""

for source_line in env_path.read_text(encoding="utf-8").splitlines():
    line = source_line.strip()
    if not line or line.startswith("#") or "=" not in line:
        continue
    key, value = line.split("=", 1)
    if key.strip() != "DATABASE_URL":
        continue
    value = value.strip()
    if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
        value = value[1:-1]
    raw = value
    break

if not raw:
    raise SystemExit(0)

parts = urlsplit(raw)
if parts.scheme and parts.netloc:
    print(urlunsplit((parts.scheme, parts.netloc, parts.path, "", "")), end="")
else:
    print(raw.split("?", 1)[0], end="")
PY
)"
              if [ -z "$DB_URL" ]; then
                echo "DATABASE_URL missing in $BACKEND_DIR/.env" >&2
                exit 1
              fi

              pg_dump "$DB_URL" | gzip -9 > "$DB_DIR/db_${STAMP}.sql.gz"
            else
              echo "Backend .env missing, skipping DB backup"
            fi

            {
              echo "timestamp=$STAMP"
              echo "frontend=$FILES_DIR/frontend_${STAMP}.tgz"
              echo "backend=$FILES_DIR/backend_${STAMP}.tgz"
              echo "db=$DB_DIR/db_${STAMP}.sql.gz"
            } > "$META_DIR/latest.env"

            ls -1dt "$FILES_DIR"/frontend_*.tgz 2>/dev/null | awk "NR>${KEEP}" | xargs -r rm -f
            ls -1dt "$FILES_DIR"/backend_*.tgz 2>/dev/null | awk "NR>${KEEP}" | xargs -r rm -f
            ls -1dt "$DB_DIR"/db_*.sql.gz 2>/dev/null | awk "NR>${KEEP}" | xargs -r rm -f

            echo "Backup completed: $STAMP"

      - name: Unpack frontend on server (atomic)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e
            cd /var/www
            RELEASE_DIR=".releases/${{ env.FRONTEND_TARGET_DIR }}"
            mkdir -p "${{ env.FRONTEND_TARGET_DIR }}" "${{ env.DEPLOY_TMP_DIR }}" "$RELEASE_DIR"
            rm -rf "$RELEASE_DIR/new"
            mkdir -p "$RELEASE_DIR/new"
            tar -xzf "${{ env.DEPLOY_TMP_DIR }}/frontend.tgz" -C "$RELEASE_DIR/new"
            if [ -d "$RELEASE_DIR/new/${{ env.FE_OUT }}" ]; then
              rsync -a --delete --exclude='.well-known' "$RELEASE_DIR/new/${{ env.FE_OUT }}/" "${{ env.FRONTEND_TARGET_DIR }}/"
            else
              rsync -a --delete --exclude='.well-known' "$RELEASE_DIR/new/" "${{ env.FRONTEND_TARGET_DIR }}/"
            fi
            rm -f "${{ env.DEPLOY_TMP_DIR }}/frontend.tgz"

      # ---------- BACKEND ----------
      - name: Pack backend source
        run: |
          set -e
          EXCLUDES=(
            --exclude="${{ env.BE_DIR }}/node_modules"
            --exclude="${{ env.BE_DIR }}/.git"
            --exclude="${{ env.BE_DIR }}/.github"
            --exclude="${{ env.BE_DIR }}/.env*"
          )
          tar -czf backend.tgz "${EXCLUDES[@]}" "${{ env.BE_DIR }}"

      - name: Upload backend archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: "backend.tgz"
          target: "${{ env.DEPLOY_TMP_DIR }}"
          overwrite: true

      - name: Unpack backend on server (atomic)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e
            cd /var/www
            RELEASE_DIR=".releases/${{ env.BACKEND_TARGET_DIR }}"
            mkdir -p "${{ env.BACKEND_TARGET_DIR }}" "${{ env.DEPLOY_TMP_DIR }}" "$RELEASE_DIR"
            rm -rf "$RELEASE_DIR/new"
            mkdir -p "$RELEASE_DIR/new"
            tar -xzf "${{ env.DEPLOY_TMP_DIR }}/backend.tgz" -C "$RELEASE_DIR/new"
            if [ -d "$RELEASE_DIR/new/backend" ]; then
              rsync -a --delete --exclude=".schema.sha256" "$RELEASE_DIR/new/backend/" "${{ env.BACKEND_TARGET_DIR }}/"
            elif [ -d "$RELEASE_DIR/new/Backend" ]; then
              rsync -a --delete --exclude=".schema.sha256" "$RELEASE_DIR/new/Backend/" "${{ env.BACKEND_TARGET_DIR }}/"
            else
              rsync -a --delete --exclude=".schema.sha256" "$RELEASE_DIR/new/" "${{ env.BACKEND_TARGET_DIR }}/"
            fi
            rm -f "${{ env.DEPLOY_TMP_DIR }}/backend.tgz"

      - name: Prepare backend .env file
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          set -e
          python3 - <<'PY'
          import os
          from pathlib import Path

          data = os.environ.get("BACKEND_ENV", "")
          data = data.replace("\r\n", "\n").replace("\r", "\n")

          if not data.strip():
              raise SystemExit("BACKEND_ENV is empty")

          required = {
              "PORT",
              "NODE_ENV",
              "DATABASE_URL",
              "JWT_SECRET",
              "JWT_REFRESH_SECRET",
              "CORS_ORIGINS",
              "BOT_DISABLED",
          }

          keys = set()
          for line in data.split("\n"):
              line = line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              keys.add(line.split("=", 1)[0].strip())

          missing = sorted(required - keys)
          if missing:
              raise SystemExit(f"BACKEND_ENV missing keys: {', '.join(missing)}")

          Path("backend.env").write_text(data.rstrip("\n") + "\n", encoding="utf-8")
          PY

      - name: Upload backend env file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: "backend.env"
          target: "${{ env.DEPLOY_TMP_DIR }}"
          overwrite: true

      - name: Upload nginx prod template
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: "deploy/nginx/prod.conf.template"
          target: "/tmp"
          overwrite: true

      - name: Move backend .env into place (chmod 640)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e
            TARGET_DIR="/var/www/${{ env.BACKEND_TARGET_DIR }}"
            TMP_ENV="${{ env.DEPLOY_TMP_DIR }}/backend.env"

            mkdir -p "${{ env.DEPLOY_TMP_DIR }}"
            test -f "$TMP_ENV"
            mkdir -p "$TARGET_DIR"

            umask 027
            mv -f "$TMP_ENV" "$TARGET_DIR/.env"
            chmod 640 "$TARGET_DIR/.env"
            chown "$(id -un)":"$(id -gn)" "$TARGET_DIR/.env"

            test -f "$TARGET_DIR/.env"
            grep '^DATABASE_URL=' "$TARGET_DIR/.env" >/dev/null
            echo ".env moved successfully to $TARGET_DIR/.env"

      - name: Install Node and pm2 on server if missing
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e
            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm i -g pm2
            fi

      - name: Sync nginx prod config and reload
        env:
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          envs: LETSENCRYPT_EMAIL
          script: |
            set -e
            TEMPLATE="/tmp/deploy/nginx/prod.conf.template"
            TARGET="/etc/nginx/sites-available/crm-prod.conf"
            TARGET_ENABLED="/etc/nginx/sites-enabled/crm-prod.conf"
            DOMAIN="${{ secrets.PRIMARY_DOMAIN }}"
            DOMAIN_WWW="$DOMAIN"
            if [ "${DOMAIN#www.}" = "$DOMAIN" ]; then
              DOMAIN_WWW="www.$DOMAIN"
            fi
            HAS_DOMAIN_WWW=0
            if [ "$DOMAIN_WWW" != "$DOMAIN" ]; then
              if getent ahosts "$DOMAIN_WWW" >/dev/null 2>&1; then
                HAS_DOMAIN_WWW=1
              else
                echo "Optional www-domain $DOMAIN_WWW has no DNS record, skipping from cert."
              fi
            fi
            test -f "$TEMPLATE"
            sed \
              -e "s/PROD_DOMAIN_WWW/$DOMAIN_WWW/g" \
              -e "s/PROD_DOMAIN/$DOMAIN/g" \
              "$TEMPLATE" | sudo tee "$TARGET" >/dev/null
            sudo ln -sf "$TARGET" "$TARGET_ENABLED"

            for enabled in /etc/nginx/sites-enabled/*; do
              [ -e "$enabled" ] || continue
              if [ "$(readlink -f "$enabled")" = "$(readlink -f "$TARGET_ENABLED")" ]; then
                continue
              fi
              if sudo grep -q "$DOMAIN" "$enabled"; then
                echo "Disabling conflicting nginx site $enabled for domain $DOMAIN"
                sudo rm -f "$enabled"
              fi
            done

            sudo nginx -t
            sudo systemctl reload nginx

            if ! command -v certbot >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y certbot python3-certbot-nginx
            fi

            CERTBOT_ARGS="--nginx --non-interactive --agree-tos --keep-until-expiring -d $DOMAIN"
            if [ "$HAS_DOMAIN_WWW" = "1" ]; then
              CERTBOT_ARGS="$CERTBOT_ARGS -d $DOMAIN_WWW"
            fi
            if [ -n "${LETSENCRYPT_EMAIL:-}" ]; then
              CERTBOT_ARGS="$CERTBOT_ARGS --email $LETSENCRYPT_EMAIL"
            else
              CERTBOT_ARGS="$CERTBOT_ARGS --register-unsafely-without-email"
            fi

            sudo certbot $CERTBOT_ARGS
            sudo nginx -t
            sudo systemctl reload nginx

      - name: Verify prod TLS certificate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e
            DOMAIN="${{ secrets.PRIMARY_DOMAIN }}"
            DOMAIN_WWW="$DOMAIN"
            if [ "${DOMAIN#www.}" = "$DOMAIN" ]; then
              DOMAIN_WWW="www.$DOMAIN"
            fi
            HAS_DOMAIN_WWW=0
            if [ "$DOMAIN_WWW" != "$DOMAIN" ] && getent ahosts "$DOMAIN_WWW" >/dev/null 2>&1; then
              HAS_DOMAIN_WWW=1
            fi
            CERT_TEXT="$(echo | openssl s_client -connect 127.0.0.1:443 -servername "$DOMAIN" 2>/dev/null | openssl x509 -noout -text)"
            echo "$CERT_TEXT" | grep -q "DNS:$DOMAIN"
            if [ "$HAS_DOMAIN_WWW" = "1" ]; then
              echo "$CERT_TEXT" | grep -q "DNS:$DOMAIN_WWW"
            fi

      - name: Install backend deps, prisma migrate, restart pm2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          envs: PRISMA_ACCEPT_DATA_LOSS
          script: |
            set -e
            TARGET_DIR="/var/www/${{ env.BACKEND_TARGET_DIR }}"

            chown -R "$(id -un)":"$(id -gn)" "$TARGET_DIR"

            cd "$TARGET_DIR"
            export HUSKY=0
            export NODE_ENV=production

            test -f .env || (echo ".env file not found in $TARGET_DIR" >&2 && exit 1)
            grep '^DATABASE_URL=' .env >/dev/null || (echo "DATABASE_URL is missing in .env" >&2 && exit 1)

            echo 'Checking DB readiness (127.0.0.1:5432)...'
            if command -v pg_isready >/dev/null 2>&1; then
              for i in {1..20}; do
                pg_isready -h 127.0.0.1 -p 5432 >/dev/null 2>&1 && echo 'DB is ready' && break
                echo "Waiting for DB... ($i/20)"
                sleep 2
              done
              pg_isready -h 127.0.0.1 -p 5432 >/dev/null 2>&1 || (echo 'DB is NOT reachable' && exit 1)
            else
              echo 'pg_isready not found, skipping DB readiness check'
            fi

            npm ci --omit=dev --no-audit --no-fund || npm install --omit=dev --no-audit --no-fund
            npx prisma generate
            echo 'Running prisma migrate deploy...'
            npx prisma migrate deploy

            echo 'Running base seed for prod dictionaries...'
            npm run seed

            APP_PORT="$(grep -E '^PORT=' .env | tail -n1 | cut -d= -f2- | tr -d '\r' | xargs || true)"
            TARGET_CWD="$(pwd)"
            if [ -n "$APP_PORT" ]; then
              LISTEN_PIDS="$(ss -ltnp 2>/dev/null | grep ":$APP_PORT " | grep -o 'pid=[0-9]*' | cut -d= -f2 | sort -u || true)"
              for pid in $LISTEN_PIDS; do
                PROC_CWD="$(readlink -f "/proc/$pid/cwd" 2>/dev/null || true)"
                if [ "$PROC_CWD" = "$TARGET_CWD" ]; then
                  continue
                fi
                echo "Stopping rogue listener pid=$pid on :$APP_PORT cwd=${PROC_CWD:-unknown}"
                kill "$pid" || true
              done
              sleep 2
              STILL_PIDS="$(ss -ltnp 2>/dev/null | grep ":$APP_PORT " | grep -o 'pid=[0-9]*' | cut -d= -f2 | sort -u || true)"
              for pid in $STILL_PIDS; do
                PROC_CWD="$(readlink -f "/proc/$pid/cwd" 2>/dev/null || true)"
                if [ "$PROC_CWD" = "$TARGET_CWD" ]; then
                  continue
                fi
                echo "Force stopping rogue listener pid=$pid on :$APP_PORT cwd=${PROC_CWD:-unknown}"
                kill -9 "$pid" || true
              done
            fi

            (pm2 restart ${{ env.PM2_APP_NAME }} --update-env || pm2 start npm --name ${{ env.PM2_APP_NAME }} --cwd "$TARGET_CWD" -- run start)
            pm2 save

            if [ -n "$APP_PORT" ]; then
              EXPECTED_LISTENER=""
              for i in {1..20}; do
                LISTEN_PIDS="$(ss -ltnp 2>/dev/null | grep ":$APP_PORT " | grep -o 'pid=[0-9]*' | cut -d= -f2 | sort -u || true)"
                if [ -n "$LISTEN_PIDS" ]; then
                  for pid in $LISTEN_PIDS; do
                    PROC_CWD="$(readlink -f "/proc/$pid/cwd" 2>/dev/null || true)"
                    echo "Port :$APP_PORT listener pid=$pid cwd=${PROC_CWD:-unknown}"
                    if [ "$PROC_CWD" = "/var/www/crm-backend" ]; then
                      echo "Legacy backend still owns prod port :$APP_PORT" >&2
                      exit 1
                    fi
                    if [ "$PROC_CWD" = "$TARGET_CWD" ]; then
                      EXPECTED_LISTENER=1
                    fi
                  done
                fi
                [ -n "$EXPECTED_LISTENER" ] && break
                echo "Waiting for ${{ env.PM2_APP_NAME }} to bind :$APP_PORT from $TARGET_CWD... ($i/20)"
                sleep 2
              done

              if [ -z "$EXPECTED_LISTENER" ]; then
                echo "Expected prod listener from $TARGET_CWD was not found on :$APP_PORT" >&2
                exit 1
              fi
            fi

      - name: Backend health check (follow redirects)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e
            HOST_HEADER="${{ secrets.PRIMARY_DOMAIN }}"

            for i in {1..20}; do
              code=$(curl -s -L -o /dev/null -w "%{http_code}" --max-time 5 -H "Host: $HOST_HEADER" "http://127.0.0.1/health" || true)
              if [ "$code" = "200" ]; then
                echo "Backend health: OK"
                exit 0
              fi
              echo "Waiting for backend... ($i/20) code=$code"
              sleep 3
            done

            echo "Backend health check FAILED"
            exit 1

      - name: Verify prod frontend serves current build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e
            FRONTEND_DIR="/var/www/${{ env.FRONTEND_TARGET_DIR }}"
            HOST_HEADER="${{ secrets.PRIMARY_DOMAIN }}"

            test -f "$FRONTEND_DIR/index.html"

            EXPECTED_INDEX_SHA="$(sha256sum "$FRONTEND_DIR/index.html" | awk '{print $1}')"
            SERVED_INDEX_SHA="$(
              curl -ksSL --resolve "$HOST_HEADER:443:127.0.0.1" "https://$HOST_HEADER/index.html" \
              | sha256sum | awk '{print $1}'
            )"

            echo "Expected index sha: $EXPECTED_INDEX_SHA"
            echo "Served   index sha: $SERVED_INDEX_SHA"

            if [ "$EXPECTED_INDEX_SHA" != "$SERVED_INDEX_SHA" ]; then
              echo "Prod domain is not serving the current frontend build from $FRONTEND_DIR" >&2
              echo "Check nginx server_name/root conflicts and stale enabled sites." >&2
              exit 1
            fi

            ASSET_PATH="$(grep -oE "/assets/[^\"' ]+\\.js" "$FRONTEND_DIR/index.html" | head -n1 || true)"
            if [ -n "$ASSET_PATH" ]; then
              ASSET_CODE="$(
                curl -ksS -o /dev/null -w "%{http_code}" \
                  --resolve "$HOST_HEADER:443:127.0.0.1" \
                  "https://$HOST_HEADER$ASSET_PATH" || true
              )"
              echo "Asset check $ASSET_PATH -> $ASSET_CODE"
              if [ "$ASSET_CODE" != "200" ]; then
                echo "Current frontend asset is not reachable through prod domain" >&2
                exit 1
              fi
            fi
